<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo squircle nero (Apple ritaglia automaticamente la forma squircle in macOS Tahoe) -->
  <rect width="1024" height="1024" fill="#1a1a1a"/>

  <!-- Antenna -->
  <line x1="435" y1="295" x2="358" y2="205" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  <circle cx="345" cy="195" r="41" fill="#FFFFFF"/>

  <!-- Testa -->
  <rect x="269" y="320" width="512" height="461" rx="56" fill="#FFFFFF"/>

  <!-- Occhio sinistro (più grande, più in basso = sbilenco) -->
  <circle cx="435" cy="512" r="56" fill="#1a1a1a"/>

  <!-- Occhio destro (più piccolo, più in alto) -->
  <circle cx="627" cy="499" r="44" fill="#1a1a1a"/>

  <!-- Bocca -->
  <rect x="435" y="653" width="205" height="46" rx="8" fill="#1a1a1a"/>
</svg>
