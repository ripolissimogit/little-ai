<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
  <!-- Template image per macOS NSStatusItem.
       Tutto nero, sfondo trasparente. macOS ignora il colore e usa solo il canale alpha.
       I "fori" (occhi, bocca) sono ottenuti con fill-rule="evenodd" su un path unico. -->

  <g fill="#000000">
    <!-- Pallina antenna -->
    <circle cx="7" cy="1.5" r="1.8"/>

    <!-- Asta antenna -->
    <line x1="11" y1="6.5" x2="8" y2="2.5" stroke="#000000" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Testa con fori (occhi + bocca) usando evenodd -->
    <path fill-rule="evenodd" d="
      M 4 8
      L 18 8
      Q 20 8 20 10
      L 20 22
      Q 20 24 18 24
      L 4 24
      Q 2 24 2 22
      L 2 10
      Q 2 8 4 8 Z

      M 7 13
      m -2 0
      a 2 2 0 1 0 4 0
      a 2 2 0 1 0 -4 0 Z

      M 15 13
      m -1.5 0
      a 1.5 1.5 0 1 0 3 0
      a 1.5 1.5 0 1 0 -3 0 Z

      M 7 18
      L 15 18
      L 15 20
      L 7 20 Z
    "/>
  </g>
</svg>
